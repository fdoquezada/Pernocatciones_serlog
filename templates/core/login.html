{% extends 'base.html' %}
{% block title %}Iniciar Sesión — Pernoctaciones{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: #1e2a3a;">
    <div class="card shadow-lg" style="width: 380px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-moon-stars-fill fs-1 text-primary"></i>
                <h4 class="fw-bold mt-2">Pernoctaciones</h4>
                <small class="text-muted">Control de descanso de equipos</small>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger py-2">
                <small>Usuario o contraseña incorrectos.</small>
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Tu usuario" autofocus required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
